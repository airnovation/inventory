<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airnovation Inventory & Material Request</title>
  <meta name="theme-color" content="#f4f7fb" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192-v4.png" />
  <link rel="shortcut icon" href="./icons/icon-192-v4.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192-v4.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; background: #f4f7fb; }
    h1, h2, h3 { font-family: Poppins, sans-serif; }
    .tab { flex: 1; min-height: 44px; border-radius: 8px; font-weight: 600; color: #475569; transition: .2s; }
    .tab.active { background: #fff; color: #2563eb; box-shadow: 0 1px 4px rgba(15, 23, 42, .12); }
    .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 700; padding: .75rem 1rem; transition: .2s; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-green { background: #059669; color: #fff; }
    .btn-green:hover:not(:disabled) { background: #047857; }
    .btn-red { background: #dc2626; color: #fff; }
    .field { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: .65rem .75rem; background: #fff; }
    .field:focus { outline: 2px solid rgba(37, 99, 235, .25); border-color: #2563eb; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 1px 3px rgba(15, 23, 42, .06); }
    .thumb { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 1px solid #cbd5e1; cursor: pointer; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: .2rem .6rem; font-size: .75rem; font-weight: 700; }
    .loader { width: 18px; height: 18px; border-radius: 999px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="mx-auto max-w-4xl p-4 md:p-8">
    <header class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <h1 class="text-2xl md:text-4xl font-bold text-slate-800">Inventory & Material Request</h1>
        <p class="mt-1 font-medium text-slate-500">Airnovation Engineering Pte Ltd</p>
      </div>
      <div id="auth-state" class="text-sm font-semibold text-slate-500"></div>
    </header>

    <section class="rounded-xl bg-white p-2 shadow-lg shadow-slate-200/70">
      <nav class="flex gap-1 rounded-lg bg-slate-100 p-1" aria-label="Tabs">
        <button class="tab active" data-tab="stock">Stock In/Out</button>
        <button class="tab" data-tab="request">Material Request</button>
        <button class="tab" data-tab="logs">Log</button>
        <button class="tab" data-tab="admin">Admin</button>
      </nav>
      <div id="view" class="min-h-[430px] p-4 md:p-6"></div>
    </section>
  </main>

  <div id="notice" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 p-4">
    <div class="card w-full max-w-sm p-6 text-center">
      <p id="notice-text" class="break-words text-left text-lg font-semibold text-slate-800"></p>
      <button class="btn btn-primary mt-5 w-full" onclick="closeNotice()">OK</button>
    </div>
  </div>

  <div id="lightbox" class="fixed inset-0 z-50 hidden cursor-pointer items-center justify-center bg-black/90 p-4" onclick="closeLightbox()">
    <img id="lightbox-img" class="max-h-full max-w-full rounded-lg" alt="Full size image" />
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, deleteDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBZ0-KPzLs13U7uG0KIqiYbKdbOBqVT7cQ",
      authDomain: "airnovation-inventory.firebaseapp.com",
      projectId: "airnovation-inventory",
      storageBucket: "airnovation-inventory.firebasestorage.app",
      messagingSenderId: "273073947687",
      appId: "1:273073947687:web:2bd59cddbf675526747a02",
      measurementId: "G-MV1LH9X1DD"
    };

    const DATA_ROOT = "artifacts/inventory-tracker-app-dev/public/data";
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userId = null;
    let isAdmin = false;
    let currentTab = "stock";
    let inventoryLogs = [];
    let materialRequests = [];
    let currentLogItems = [];
    let unsubscribed = false;
    let inventorySnapshotReady = false;
    let requestSnapshotReady = false;
    let notificationAudio = null;

    const view = document.getElementById("view");
    const authState = document.getElementById("auth-state");
    document.addEventListener("click", unlockNotificationSound, { once: true });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        await signInAnonymously(auth).catch(err => showNotice("Cannot connect to service: " + formatFirebaseError(err)));
        return;
      }
      userId = user.uid;
      isAdmin = !user.isAnonymous;
      authState.textContent = isAdmin ? `Admin: ${user.email}` : "Staff mode";
      if (!unsubscribed) {
        unsubscribed = true;
        onSnapshot(
          query(collection(db, `${DATA_ROOT}/inventory_logs`)),
          snap => {
            notifyNewRecords(snap, "New stock record received.", "stock");
            inventoryLogs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
          },
          err => showNotice("Cannot load inventory logs: " + formatFirebaseError(err))
        );
        onSnapshot(
          query(collection(db, `${DATA_ROOT}/material_requests`)),
          snap => {
            notifyNewRecords(snap, "New material request received.", "request");
            materialRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
          },
          err => showNotice("Cannot load material requests: " + formatFirebaseError(err))
        );
      }
      render();
    });

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
      render();
    }

    document.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => setTab(btn.dataset.tab)));

    function render() {
      if (currentTab === "stock") renderStockForm();
      if (currentTab === "request") renderRequestForm();
      if (currentTab === "logs") renderLogs();
      if (currentTab === "admin") renderAdmin();
    }

    function renderStockForm() {
      view.innerHTML = `
        <form id="stock-form" class="mx-auto max-w-2xl space-y-5">
          <h2 class="text-xl font-bold text-slate-800">Stock In/Out</h2>
          <section class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
              <label class="card cursor-pointer p-4"><input type="radio" name="type" value="outbound" checked class="mr-2"> Stock Out</label>
              <label class="card cursor-pointer p-4"><input type="radio" name="type" value="inbound" class="mr-2"> Stock In</label>
            </div>
            <div class="grid gap-4 md:grid-cols-2">
              <label class="block text-sm font-semibold text-slate-600">Dept./PIC <input id="department-head" required class="field mt-1"></label>
              <label class="block text-sm font-semibold text-slate-600">Location <input id="location" required class="field mt-1"></label>
            </div>
            <label class="block text-sm font-semibold text-slate-600">Photo / Attachment<input id="stock-photo" type="file" accept="image/*" class="field mt-1"></label>
            <img id="stock-preview" class="thumb hidden" alt="Stock preview">
          </section>

          <section class="space-y-3">
            <div class="flex items-center justify-between gap-3">
              <h3 class="text-base font-bold text-slate-700">Items</h3>
              <button id="add-stock-item" class="btn bg-slate-200 px-3 py-2 text-slate-700" type="button">+ Add Item</button>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full min-w-[760px] text-left text-sm">
                <thead class="text-slate-500">
                  <tr>
                    <th class="pb-2 pr-3">Item Name</th>
                    <th class="pb-2 pr-3">Quantity</th>
                    <th class="pb-2 pr-3">Unit</th>
                    <th class="pb-2 pr-3">Remark</th>
                    <th class="pb-2">Action</th>
                  </tr>
                </thead>
                <tbody id="stock-items" class="align-top"></tbody>
              </table>
            </div>
          </section>
          <button class="btn btn-primary w-full" type="submit"><span>Submit</span><span class="loader ml-3 hidden"></span></button>
        </form>`;
      bindPhoto("stock-photo", "stock-preview");
      addStockItemRow();
      document.getElementById("add-stock-item").addEventListener("click", addStockItemRow);
      document.getElementById("stock-form").addEventListener("submit", submitStock);
    }

    function renderRequestForm() {
      view.innerHTML = `
        <form id="request-form" class="mx-auto max-w-2xl space-y-5">
          <h2 class="text-xl font-bold text-slate-800">Material Request</h2>
          <section class="space-y-4">
            <h3 class="text-base font-bold text-slate-700">Request Information</h3>
            <div class="grid gap-4 md:grid-cols-2">
              <label class="block text-sm font-semibold text-slate-600">PIC Name <input id="request-person" required class="field mt-1"></label>
              <label class="block text-sm font-semibold text-slate-600">Used For <input id="request-purpose" required class="field mt-1"></label>
              <label class="block text-sm font-semibold text-slate-600">Date Needed <input id="request-date" type="date" class="field mt-1"></label>
              <label class="block text-sm font-semibold text-slate-600">Delivery Address <input id="request-address" required class="field mt-1"></label>
            </div>
            <label class="block text-sm font-semibold text-slate-600">Photo / Attachment (Optional)<input id="request-photo" type="file" accept="image/*" class="field mt-1"></label>
            <img id="request-preview" class="thumb hidden" alt="Request preview">
          </section>

          <section class="space-y-3">
            <div class="flex items-center justify-between gap-3">
              <h3 class="text-base font-bold text-slate-700">Requested Items</h3>
              <button id="add-request-item" class="btn bg-slate-200 px-3 py-2 text-slate-700" type="button">+ Add Another Item</button>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full min-w-[640px] text-left text-sm">
                <thead class="text-slate-500">
                  <tr>
                    <th class="pb-2 pr-3">Material Name</th>
                    <th class="pb-2 pr-3">Quantity</th>
                    <th class="pb-2 pr-3">Remark</th>
                    <th class="pb-2">Action</th>
                  </tr>
                </thead>
                <tbody id="request-items" class="align-top"></tbody>
              </table>
            </div>
          </section>
          <button class="btn btn-green w-full" type="submit"><span>Submit Request</span><span class="loader ml-3 hidden"></span></button>
        </form>`;
      bindPhoto("request-photo", "request-preview");
      addRequestItemRow();
      document.getElementById("add-request-item").addEventListener("click", addRequestItemRow);
      document.getElementById("request-form").addEventListener("submit", submitRequest);
    }

    function renderLogs() {
      const items = [...inventoryLogs.map(x => ({...x, kind: "stock"})), ...materialRequests.map(x => ({...x, kind: "request"}))]
        .sort((a, b) => (b.timestamp?.toMillis?.() || 0) - (a.timestamp?.toMillis?.() || 0));
      currentLogItems = items;
      view.innerHTML = `
        <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <h2 class="text-xl font-bold text-slate-800">Activity Log</h2>
          <div class="flex flex-wrap gap-2">
            <button id="print-log" class="btn bg-slate-200 px-3 py-2 text-slate-700" type="button">Print</button>
            <button id="export-csv" class="btn bg-slate-200 px-3 py-2 text-slate-700" type="button">Export CSV</button>
          </div>
        </div>
        <div id="log-list" class="space-y-3"></div>`;
      document.getElementById("print-log").addEventListener("click", printLogs);
      document.getElementById("export-csv").addEventListener("click", () => exportLogs("csv"));
      const list = document.getElementById("log-list");
      if (!items.length) {
        list.innerHTML = `<div class="py-16 text-center font-semibold text-slate-400">No records found</div>`;
        return;
      }
      items.forEach(item => list.appendChild(item.kind === "request" ? requestCard(item, false) : stockCard(item)));
    }

    function renderAdmin() {
      if (!isAdmin) {
        view.innerHTML = `
          <form id="admin-login" class="mx-auto max-w-sm space-y-4">
            <h2 class="text-xl font-bold text-slate-800">Admin Login</h2>
            <input id="admin-email" type="email" required autocomplete="username" class="field" placeholder="Admin email">
            <input id="admin-password" type="password" required autocomplete="current-password" class="field" placeholder="Password">
            <p id="login-error" class="hidden text-sm font-semibold text-red-600">Login failed. Please check email and password.</p>
            <button class="btn btn-primary w-full" type="submit">Login</button>
          </form>`;
        document.getElementById("admin-login").addEventListener("submit", adminLogin);
        return;
      }
      view.innerHTML = `
        <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <h2 class="text-xl font-bold text-slate-800">Material Request Management</h2>
          <button id="logout" class="btn bg-slate-200 text-slate-700">Logout</button>
        </div>
        <div id="admin-list" class="space-y-3"></div>`;
      document.getElementById("logout").addEventListener("click", adminLogout);
      const list = document.getElementById("admin-list");
      const sorted = [...materialRequests].sort((a, b) => getStatusRank(a.status) - getStatusRank(b.status));
      if (!sorted.length) {
        list.innerHTML = `<div class="py-16 text-center font-semibold text-slate-400">No pending requests</div>`;
        return;
      }
      sorted.forEach(item => list.appendChild(requestCard(item, true)));
    }

    function stockCard(log) {
      const el = document.createElement("article");
      const outbound = log.type === "outbound";
      const stockItems = getStockItems(log);
      const itemRows = stockItems.map(item => `
        <tr class="border-t border-slate-100">
          <td class="py-2 pr-3 font-semibold text-slate-700">${escapeHtml(item.itemName || "Untitled item")}</td>
          <td class="py-2 pr-3">${escapeHtml(String(item.quantity || 0))}</td>
          <td class="py-2 pr-3">${escapeHtml(item.unit || "-")}</td>
          <td class="py-2 pr-3">${escapeHtml(item.remark || "-")}</td>
        </tr>`).join("");
      el.className = `card border-l-4 p-4 ${outbound ? "border-l-orange-500" : "border-l-emerald-500"}`;
      el.innerHTML = `
        <div class="flex justify-between gap-4">
          <div><h3 class="font-bold text-slate-800"></h3><p class="text-sm text-slate-500"></p><p class="text-sm text-slate-500"></p></div>
          <div class="text-right"><div class="font-bold ${outbound ? "text-orange-600" : "text-emerald-600"}">${outbound ? "Stock Out" : "Stock In"} | Items: ${stockItems.length}</div><p class="text-xs text-slate-400">${formatTime(log.timestamp)}</p></div>
        </div>
        <div class="mt-3 border-t border-slate-100 pt-3 text-sm text-slate-600">
          <div class="overflow-x-auto">
            <table class="w-full min-w-[520px] text-left text-sm">
              <thead class="text-slate-400"><tr><th class="pb-2 pr-3">Item Name</th><th class="pb-2 pr-3">Quantity</th><th class="pb-2 pr-3">Unit</th><th class="pb-2 pr-3">Remark</th></tr></thead>
              <tbody>${itemRows}</tbody>
            </table>
          </div>
        </div>
        ${log.imageDataURL ? `<img src="${log.imageDataURL}" class="thumb mt-3" alt="Log image">` : ""}
        ${isAdmin ? `<div class="mt-3 border-t border-slate-100 pt-3 text-right"><button class="delete btn btn-red px-3 py-2" data-type="log" data-id="${log.id}">Delete</button></div>` : ""}`;
      el.querySelector("h3").textContent = stockItems.length === 1 ? stockItems[0].itemName : `${stockItems.length} stock items`;
      el.querySelectorAll("p")[0].textContent = `By: ${log.departmentHead || "N/A"}`;
      el.querySelectorAll("p")[1].textContent = `Location: ${log.location || "N/A"}`;
      bindCardActions(el);
      return el;
    }

    function requestCard(req, adminControls) {
      const el = document.createElement("article");
      const requestItems = getRequestItems(req);
      const itemRows = requestItems.map((item, index) => adminControls ? adminRequestItemRow(req, item, index) : logRequestItemRow(req, item)).join("");
      const displayStatus = getRequestDisplayStatus(req, requestItems);
      el.className = "card border-l-4 border-l-blue-500 p-4";
      el.innerHTML = `
        <div class="flex justify-between gap-4">
          <div><h3 class="font-bold text-slate-800"></h3><p class="text-sm text-slate-500"></p><p class="text-sm text-slate-500"></p></div>
          <div class="text-right"><span class="badge ${getStatusClass(displayStatus)}">${getStatusLabel(displayStatus)}</span><p class="mt-1 text-xs text-slate-400">${formatTime(req.timestamp)}</p></div>
        </div>
        <div class="mt-3 border-t border-slate-100 pt-3 text-sm text-slate-600">
          <p></p><p></p>
          <div class="mt-3 overflow-x-auto">
            <table class="w-full ${adminControls ? "min-w-[760px]" : "min-w-[560px]"} text-left text-sm">
              <thead class="text-slate-400"><tr>${adminControls ? adminRequestHeader() : logRequestHeader()}</tr></thead>
              <tbody>${itemRows}</tbody>
            </table>
          </div>
          ${adminControls ? statusAudit(req) : ""}
          ${req.arrivalDate ? `<p class="mt-2 font-bold text-emerald-600">ETA: ${req.arrivalDate}</p>` : ""}
        </div>
        ${req.imageDataURL ? `<img src="${req.imageDataURL}" class="thumb mt-3" alt="Request image">` : ""}
        ${adminControls ? adminButtons(req) : ""}`;
      el.querySelector("h3").textContent = requestItems.length === 1 ? requestItems[0].materialName : `${requestItems.length} requested items`;
      el.querySelectorAll("p")[0].textContent = `By: ${req.personInCharge || "N/A"} | Items: ${requestItems.length}`;
      el.querySelectorAll("p")[1].textContent = `For: ${req.purpose || "N/A"}`;
      const detail = el.querySelector(".mt-3.border-t");
      detail.querySelectorAll("p")[0].textContent = `To: ${req.deliveryAddress || "N/A"}`;
      detail.querySelectorAll("p")[1].textContent = `Date Needed: ${req.dateNeeded || "N/A"}`;
      bindCardActions(el);
      return el;
    }

    function logRequestHeader() {
      return `<th class="pb-2 pr-3">Material Name</th><th class="pb-2 pr-3">Quantity</th><th class="pb-2 pr-3">Remark</th><th class="pb-2 pr-3">Status</th><th class="pb-2 pr-3">Admin Remark</th>`;
    }

    function adminRequestHeader() {
      return `<th class="pb-2 pr-3">Material Name</th><th class="pb-2 pr-3">Quantity</th><th class="pb-2 pr-3">User Remark</th><th class="pb-2 pr-3">Status</th><th class="pb-2 pr-3">Admin Remark</th><th class="pb-2 pr-3">Action</th>`;
    }

    function logRequestItemRow(req, item) {
      const status = getItemStatus(item, req.status);
      const handled = item.adminUpdatedBy ? `<div class="mt-1 text-xs text-slate-400">By: ${escapeHtml(item.adminUpdatedBy)}</div>` : "";
      return `
        <tr class="border-t border-slate-100">
          <td class="py-2 pr-3 font-semibold text-slate-700">${escapeHtml(item.materialName || "Untitled material")}</td>
          <td class="py-2 pr-3">${escapeHtml(String(item.quantity || 0))}</td>
          <td class="py-2 pr-3">${escapeHtml(item.remark || "-")}</td>
          <td class="py-2 pr-3"><span class="badge ${getStatusClass(status)}">${getStatusLabel(status)}</span>${handled}</td>
          <td class="py-2 pr-3">${escapeHtml(item.adminRemark || "-")}</td>
        </tr>`;
    }

    function adminRequestItemRow(req, item, index) {
      const options = getSelectableStatusOptions().map(([status, label]) => {
        const selected = getItemStatus(item, req.status) === status ? " selected" : "";
        return `<option value="${status}"${selected}>${label}</option>`;
      }).join("");
      const handled = item.adminUpdatedBy ? `<div class="mt-1 text-xs text-slate-400">By: ${escapeHtml(item.adminUpdatedBy)}${item.adminUpdatedAt ? ` | ${escapeHtml(formatDateString(item.adminUpdatedAt))}` : ""}</div>` : "";
      return `
        <tr class="border-t border-slate-100">
          <td class="py-2 pr-3 font-semibold text-slate-700">${escapeHtml(item.materialName || "Untitled material")}</td>
          <td class="py-2 pr-3">${escapeHtml(String(item.quantity || 0))}</td>
          <td class="py-2 pr-3">${escapeHtml(item.remark || "-")}</td>
          <td class="py-2 pr-3">
            <select class="request-item-status field min-w-[140px]" data-id="${req.id}" data-index="${index}" aria-label="Item status">${options}</select>
            ${handled}
          </td>
          <td class="py-2 pr-3"><input class="request-item-admin-remark field min-w-[180px]" data-id="${req.id}" data-index="${index}" value="${escapeAttr(item.adminRemark || "")}" placeholder="Admin remark"></td>
          <td class="py-2 pr-3"><button class="save-request-item btn bg-slate-200 px-3 py-2 text-slate-700" data-id="${req.id}" data-index="${index}" type="button">Save</button></td>
        </tr>`;
    }

    function adminButtons(req) {
      return `<div class="mt-3 flex flex-wrap items-center gap-2 border-t border-slate-100 pt-3">
        <input class="eta field w-auto" type="date" data-id="${req.id}" value="${req.arrivalDate || ""}" title="ETA">
        <button class="delete btn btn-red px-3 py-2" data-type="request" data-id="${req.id}">Delete</button>
      </div>`;
    }

    function bindCardActions(el) {
      el.querySelectorAll(".thumb").forEach(img => img.addEventListener("click", () => openLightbox(img.src)));
      el.querySelector(".delete")?.addEventListener("click", deleteItem);
      el.querySelectorAll(".request-status").forEach(select => {
        select.addEventListener("change", e => updateRequestStatus(e.currentTarget.dataset.id, e.currentTarget.value));
      });
      el.querySelectorAll(".save-request-item").forEach(button => {
        button.addEventListener("click", saveRequestItemAdminUpdate);
      });
      el.querySelector(".eta")?.addEventListener("change", e => updateRequest(e.currentTarget.dataset.id, { arrivalDate: e.currentTarget.value }));
    }

    function addStockItemRow() {
      const body = document.getElementById("stock-items");
      if (!body) return;
      const row = document.createElement("tr");
      row.className = "stock-item-row";
      row.innerHTML = `
        <td class="pb-3 pr-3"><input class="stock-item-name field" required placeholder="Cable Tray"></td>
        <td class="pb-3 pr-3"><input class="stock-quantity field" required type="number" min="1" placeholder="10"></td>
        <td class="pb-3 pr-3"><input class="stock-unit field" placeholder="pcs"></td>
        <td class="pb-3 pr-3"><input class="stock-remark field" placeholder="Project A"></td>
        <td class="pb-3"><button class="remove-stock-item btn btn-red px-3 py-2" type="button">Remove</button></td>`;
      row.querySelector(".remove-stock-item").addEventListener("click", () => {
        row.remove();
        refreshStockItemActions();
      });
      body.appendChild(row);
      refreshStockItemActions();
    }

    function refreshStockItemActions() {
      const rows = document.querySelectorAll(".stock-item-row");
      rows.forEach(row => {
        row.querySelector(".remove-stock-item").disabled = rows.length === 1;
      });
    }

    function collectStockItems() {
      return [...document.querySelectorAll(".stock-item-row")].map(row => ({
        itemName: row.querySelector(".stock-item-name").value.trim(),
        quantity: Number(row.querySelector(".stock-quantity").value) || 0,
        unit: row.querySelector(".stock-unit").value.trim(),
        remark: row.querySelector(".stock-remark").value.trim()
      })).filter(item => item.itemName && item.quantity > 0);
    }

    function getStockItems(log) {
      if (Array.isArray(log.items) && log.items.length) return log.items;
      return [{
        itemName: log.itemName || "Untitled item",
        quantity: log.quantity || 0,
        unit: log.unit || "",
        remark: log.remark || ""
      }];
    }

    function addRequestItemRow() {
      const body = document.getElementById("request-items");
      if (!body) return;
      const row = document.createElement("tr");
      row.className = "request-item-row";
      row.innerHTML = `
        <td class="pb-3 pr-3"><input class="request-material field" required placeholder="Cable Tray"></td>
        <td class="pb-3 pr-3"><input class="request-quantity field" required type="number" min="1" placeholder="10"></td>
        <td class="pb-3 pr-3"><input class="request-remark field" placeholder="300 mm"></td>
        <td class="pb-3"><button class="remove-request-item btn btn-red px-3 py-2" type="button">Remove</button></td>`;
      row.querySelector(".remove-request-item").addEventListener("click", () => {
        row.remove();
        refreshRequestItemActions();
      });
      body.appendChild(row);
      refreshRequestItemActions();
    }

    function refreshRequestItemActions() {
      const rows = document.querySelectorAll(".request-item-row");
      rows.forEach(row => {
        row.querySelector(".remove-request-item").disabled = rows.length === 1;
      });
    }

    function collectRequestItems() {
      return [...document.querySelectorAll(".request-item-row")].map(row => ({
        materialName: row.querySelector(".request-material").value.trim(),
        quantity: Number(row.querySelector(".request-quantity").value) || 0,
        remark: row.querySelector(".request-remark").value.trim(),
        adminStatus: "new",
        adminRemark: ""
      })).filter(item => item.materialName && item.quantity > 0);
    }

    function getRequestItems(req) {
      if (Array.isArray(req.items) && req.items.length) return req.items;
      return [{
        materialName: req.materialName || "Untitled material",
        quantity: req.quantity || 0,
        remark: req.remark || "",
        adminStatus: normalizeStatus(req.status),
        adminRemark: req.adminRemark || ""
      }];
    }

    function getSelectableStatusOptions() {
      return [
        ["new", "New"],
        ["processing", "Process"],
        ["still_pending", "Still Pending"],
        ["rejected", "Rejected"],
        ["completed", "Completed"]
      ];
    }

    function getStatusOptions() {
      return [
        ...getSelectableStatusOptions(),
        ["partial_processed", "Partially Processed"],
        ["partial_rejected", "Partially Rejected"]
      ];
    }

    function normalizeStatus(status) {
      if (status === "process") return "processing";
      if (status === "pending") return "still_pending";
      return status || "new";
    }

    function getStatusLabel(status) {
      return Object.fromEntries(getStatusOptions())[normalizeStatus(status)] || "New";
    }

    function getStatusClass(status) {
      return ({
        new: "bg-red-100 text-red-700",
        processing: "bg-blue-100 text-blue-700",
        still_pending: "bg-amber-100 text-amber-700",
        rejected: "bg-slate-200 text-slate-700",
        completed: "bg-emerald-100 text-emerald-700",
        partial_processed: "bg-indigo-100 text-indigo-700",
        partial_rejected: "bg-orange-100 text-orange-700"
      })[normalizeStatus(status)] || "bg-red-100 text-red-700";
    }

    function getStatusRank(status) {
      return ({
        new: 1,
        still_pending: 2,
        processing: 3,
        partial_processed: 4,
        partial_rejected: 5,
        rejected: 6,
        completed: 7
      })[normalizeStatus(status)] || 6;
    }

    function getItemStatus(item, fallbackStatus = "new") {
      return normalizeStatus(item.adminStatus || item.status || fallbackStatus || "new");
    }

    function getRequestDisplayStatus(req, items = getRequestItems(req)) {
      if (!items.length) return normalizeStatus(req.status);
      const statuses = items.map(item => getItemStatus(item, req.status));
      if (statuses.every(status => status === "new")) return "new";
      if (statuses.every(status => status === "completed")) return "completed";
      if (statuses.every(status => status === "rejected")) return "rejected";
      if (statuses.some(status => status === "rejected")) return "partial_rejected";
      if (statuses.every(status => status === "still_pending")) return "still_pending";
      if (statuses.some(status => status === "processing" || status === "completed" || status === "still_pending")) return "partial_processed";
      return normalizeStatus(req.status);
    }

    function statusAudit(req) {
      const history = Array.isArray(req.statusHistory) ? req.statusHistory.slice(-4) : [];
      const latest = req.statusUpdatedBy ? `<p class="mt-2 text-xs font-semibold text-slate-500">Last handled by: ${escapeHtml(req.statusUpdatedBy)}${req.statusUpdatedAt ? ` | ${formatTime(req.statusUpdatedAt)}` : ""}</p>` : "";
      if (!history.length) return latest;
      const rows = history.map(entry => {
        const when = entry.at ? new Date(entry.at).toLocaleString() : "Just now";
        return `<li>${escapeHtml(getStatusLabel(entry.status))} by ${escapeHtml(entry.by || "Unknown")} (${escapeHtml(when)})</li>`;
      }).join("");
      return `${latest}<div class="mt-2 text-xs text-slate-500"><div class="font-bold text-slate-600">Status History</div><ul class="mt-1 list-disc space-y-1 pl-5">${rows}</ul></div>`;
    }

    function buildExportRows() {
      return currentLogItems.flatMap(item => {
        const base = {
          type: item.kind === "request" ? "Material Request" : (item.type === "outbound" ? "Stock Out" : "Stock In"),
          status: item.kind === "request" ? getStatusLabel(item.status) : "",
          time: formatTime(item.timestamp),
          pic: item.personInCharge || item.departmentHead || "",
          usedFor: item.purpose || "",
          location: item.location || "",
          dateNeeded: item.dateNeeded || "",
          deliveryAddress: item.deliveryAddress || "",
          handledBy: isAdmin ? (item.statusUpdatedBy || "") : ""
        };
        if (item.kind === "request") {
          return getRequestItems(item).map(requestItem => ({
            ...base,
            status: getStatusLabel(getItemStatus(requestItem, item.status)),
            materialName: requestItem.materialName || "",
            quantity: requestItem.quantity || 0,
            unit: "",
            remark: requestItem.remark || "",
            adminRemark: requestItem.adminRemark || "",
            handledBy: requestItem.adminUpdatedBy || base.handledBy || ""
          }));
        }
        return getStockItems(item).map(stockItem => ({
          ...base,
          materialName: stockItem.itemName || "",
          quantity: stockItem.quantity || 0,
          unit: stockItem.unit || "",
          remark: stockItem.remark || ""
        }));
      });
    }

    function exportLogs(format) {
      const rows = buildExportRows();
      if (!rows.length) {
        showNotice("No records to export.");
        return;
      }
      const date = new Date().toISOString().slice(0, 10);
      const headers = ["type", "status", "time", "pic", "usedFor", "materialName", "quantity", "unit", "remark", "adminRemark", "location", "dateNeeded", "deliveryAddress", "handledBy"];
      const csv = [
        headers.join(","),
        ...rows.map(row => headers.map(header => csvCell(row[header])).join(","))
      ].join("\n");
      downloadFile(`airnovation-log-${date}.csv`, csv, "text/csv;charset=utf-8");
    }

    function printLogs() {
      const rows = buildExportRows();
      if (!rows.length) {
        showNotice("No records to print.");
        return;
      }
      const bodyRows = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.type)}</td>
          <td>${escapeHtml(row.status)}</td>
          <td>${escapeHtml(row.time)}</td>
          <td>${escapeHtml(row.pic)}</td>
          <td>${escapeHtml(row.usedFor)}</td>
          <td>${escapeHtml(row.materialName)}</td>
          <td>${escapeHtml(row.quantity)}</td>
          <td>${escapeHtml(row.unit)}</td>
          <td>${escapeHtml(row.remark)}</td>
          <td>${escapeHtml(row.adminRemark)}</td>
          <td>${escapeHtml(row.dateNeeded)}</td>
        </tr>`).join("");
      const printWindow = window.open("", "_blank");
      if (!printWindow) {
        showNotice("Please allow pop-ups to print.");
        return;
      }
      printWindow.document.write(`
        <!doctype html>
        <html>
          <head>
            <title>Airnovation Activity Log</title>
            <style>
              body { font-family: Arial, sans-serif; color: #111827; }
              h1 { font-size: 20px; margin-bottom: 4px; }
              p { margin: 0 0 16px; color: #475569; }
              table { width: 100%; border-collapse: collapse; font-size: 12px; }
              th, td { border: 1px solid #cbd5e1; padding: 6px; text-align: left; vertical-align: top; }
              th { background: #f1f5f9; }
            </style>
          </head>
          <body>
            <h1>Airnovation Activity Log</h1>
            <p>Printed: ${escapeHtml(new Date().toLocaleString())}</p>
            <table>
              <thead><tr><th>Type</th><th>Status</th><th>Time</th><th>PIC</th><th>Used For</th><th>Material</th><th>Qty</th><th>Unit</th><th>Remark</th><th>Admin Remark</th><th>Date Needed</th></tr></thead>
              <tbody>${bodyRows}</tbody>
            </table>
          </body>
        </html>`);
      printWindow.document.close();
      printWindow.focus();
      printWindow.print();
    }

    function csvCell(value) {
      return `"${String(value ?? "").replaceAll('"', '""')}"`;
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function notifyNewRecords(snap, message, kind) {
      const snapshotReady = kind === "stock" ? inventorySnapshotReady : requestSnapshotReady;
      if (!snapshotReady) {
        if (kind === "stock") inventorySnapshotReady = true;
        if (kind === "request") requestSnapshotReady = true;
        return;
      }
      const hasNewRecord = snap.docChanges().some(change => change.type === "added");
      if (isAdmin && hasNewRecord) {
        playNotificationSound();
        showToast(message);
      }
    }

    function unlockNotificationSound() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        notificationAudio ||= new AudioContext();
        if (notificationAudio.state === "suspended") notificationAudio.resume();
      } catch (err) {
        console.warn("Notification sound could not be enabled.", err);
      }
    }

    function playNotificationSound() {
      try {
        unlockNotificationSound();
        if (!notificationAudio || notificationAudio.state !== "running") return;
        const now = notificationAudio.currentTime;
        [880, 1175].forEach((frequency, index) => {
          const oscillator = notificationAudio.createOscillator();
          const gain = notificationAudio.createGain();
          const start = now + index * 0.12;
          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(frequency, start);
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.18, start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.18);
          oscillator.connect(gain).connect(notificationAudio.destination);
          oscillator.start(start);
          oscillator.stop(start + 0.2);
        });
      } catch (err) {
        console.warn("Notification sound failed.", err);
      }
    }

    function showToast(message) {
      const toast = document.createElement("div");
      toast.className = "fixed bottom-4 right-4 z-40 rounded-lg bg-slate-900 px-4 py-3 text-sm font-semibold text-white shadow-lg";
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    async function submitStock(e) {
      e.preventDefault();
      const form = e.currentTarget;
      const button = form.querySelector("button[type=submit]");
      setLoading(button, true);
      try {
        const imageDataURL = await previewData("stock-preview");
        const stockItems = collectStockItems();
        if (!stockItems.length) {
          showNotice("Please add at least one stock item.");
          return;
        }
        await addDoc(collection(db, `${DATA_ROOT}/inventory_logs`), {
          type: form.querySelector("[name=type]:checked").value,
          itemName: stockItems[0].itemName,
          quantity: stockItems.reduce((sum, item) => sum + item.quantity, 0),
          unit: stockItems[0].unit,
          items: stockItems,
          departmentHead: document.getElementById("department-head").value,
          location: document.getElementById("location").value,
          imageDataURL,
          timestamp: serverTimestamp(),
          submitterId: userId
        });
        form.reset();
        document.getElementById("stock-preview").classList.add("hidden");
        document.getElementById("stock-items").innerHTML = "";
        addStockItemRow();
        showNotice("Record submitted successfully.");
      } catch (err) {
        console.error(err);
        showNotice("Submission failed: " + formatFirebaseError(err));
      } finally {
        setLoading(button, false);
      }
    }

    async function submitRequest(e) {
      e.preventDefault();
      const form = e.currentTarget;
      const button = form.querySelector("button[type=submit]");
      setLoading(button, true);
      try {
        const imageDataURL = await previewData("request-preview");
        const requestItems = collectRequestItems();
        if (!requestItems.length) {
          showNotice("Please add at least one requested item.");
          return;
        }
        await addDoc(collection(db, `${DATA_ROOT}/material_requests`), {
          personInCharge: document.getElementById("request-person").value,
          purpose: document.getElementById("request-purpose").value,
          materialName: requestItems[0].materialName,
          quantity: requestItems.reduce((sum, item) => sum + item.quantity, 0),
          items: requestItems,
          dateNeeded: document.getElementById("request-date").value,
          deliveryAddress: document.getElementById("request-address").value,
          status: "new",
          imageDataURL,
          timestamp: serverTimestamp(),
          submitterId: userId
        });
        form.reset();
        document.getElementById("request-preview").classList.add("hidden");
        document.getElementById("request-items").innerHTML = "";
        addRequestItemRow();
        showNotice("Request submitted successfully.");
      } catch (err) {
        console.error(err);
        showNotice("Submission failed: " + formatFirebaseError(err));
      } finally {
        setLoading(button, false);
      }
    }

    async function adminLogin(e) {
      e.preventDefault();
      try {
        unlockNotificationSound();
        await signInWithEmailAndPassword(auth, document.getElementById("admin-email").value.trim(), document.getElementById("admin-password").value);
        setTab("admin");
      } catch (err) {
        console.error(err);
        document.getElementById("login-error").textContent = "Login failed: " + formatFirebaseError(err);
        document.getElementById("login-error").classList.remove("hidden");
      }
    }

    async function adminLogout() {
      await signOut(auth);
      await signInAnonymously(auth);
      isAdmin = false;
      setTab("stock");
      showNotice("Logged out from admin mode.");
    }

    async function deleteItem(e) {
      if (!isAdmin) return;
      const { id, type } = e.currentTarget.dataset;
      const collectionName = type === "log" ? "inventory_logs" : "material_requests";
      const record = type === "log"
        ? inventoryLogs.find(item => item.id === id)
        : materialRequests.find(item => item.id === id);
      const recordName = type === "log"
        ? (record?.itemName || "this stock record")
        : (record?.materialName || getRequestItems(record || {})[0]?.materialName || "this material request");
      const label = type === "log" ? "stock record" : "material request";
      const ok = window.confirm(`Delete ${label}: ${recordName}?\n\nThis action cannot be undone.`);
      if (!ok) return;
      await deleteDoc(doc(db, `${DATA_ROOT}/${collectionName}`, id)).catch(err => showNotice("Deletion failed: " + formatFirebaseError(err)));
    }

    async function updateRequest(id, data) {
      if (!isAdmin) return;
      await updateDoc(doc(db, `${DATA_ROOT}/material_requests`, id), data).catch(err => showNotice("Update failed: " + formatFirebaseError(err)));
    }

    async function updateRequestStatus(id, status) {
      if (!isAdmin) return;
      const email = auth.currentUser?.email || "Unknown admin";
      await updateDoc(doc(db, `${DATA_ROOT}/material_requests`, id), {
        status,
        statusUpdatedBy: email,
        statusUpdatedAt: serverTimestamp(),
        statusHistory: arrayUnion({
          status,
          by: email,
          at: new Date().toISOString()
        })
      }).catch(err => showNotice("Status update failed: " + formatFirebaseError(err)));
    }

    async function saveRequestItemAdminUpdate(e) {
      if (!isAdmin) return;
      const button = e.currentTarget;
      const id = button.dataset.id;
      const index = Number(button.dataset.index);
      const row = button.closest("tr");
      const request = materialRequests.find(item => item.id === id);
      if (!request || !row || Number.isNaN(index)) return;

      const items = getRequestItems(request).map(item => ({ ...item }));
      if (!items[index]) return;

      const email = auth.currentUser?.email || "Unknown admin";
      const status = row.querySelector(".request-item-status")?.value || "new";
      const adminRemark = row.querySelector(".request-item-admin-remark")?.value.trim() || "";
      const updatedAt = new Date().toISOString();

      items[index] = {
        ...items[index],
        adminStatus: status,
        adminRemark,
        adminUpdatedBy: email,
        adminUpdatedAt: updatedAt
      };

      const requestStatus = getRequestDisplayStatus(request, items);
      setLoading(button, true);
      await updateDoc(doc(db, `${DATA_ROOT}/material_requests`, id), {
        items,
        status: requestStatus,
        statusUpdatedBy: email,
        statusUpdatedAt: serverTimestamp(),
        statusHistory: arrayUnion({
          status: requestStatus,
          item: items[index].materialName || `Item ${index + 1}`,
          itemStatus: status,
          adminRemark,
          by: email,
          at: updatedAt
        })
      })
        .then(() => showNotice("Item update saved."))
        .catch(err => showNotice("Item update failed: " + formatFirebaseError(err)))
        .finally(() => setLoading(button, false));
    }

    function bindPhoto(inputId, previewId) {
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);
      input.addEventListener("change", () => {
        const file = input.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => { preview.src = reader.result; preview.classList.remove("hidden"); };
        reader.readAsDataURL(file);
      });
    }

    async function previewData(id) {
      const img = document.getElementById(id);
      if (!img?.src?.startsWith("data:image")) return "";
      return resizeImage(img.src);
    }

    function resizeImage(dataUrl) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          const max = 700;
          let { width, height } = img;
          if (width > height && width > max) { height *= max / width; width = max; }
          if (height >= width && height > max) { width *= max / height; height = max; }
          canvas.width = width;
          canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL("image/jpeg", .72));
        };
        img.onerror = () => resolve("");
        img.src = dataUrl;
      });
    }

    function setLoading(button, active) {
      button.disabled = active;
      button.querySelector(".loader")?.classList.toggle("hidden", !active);
    }

    function formatTime(ts) {
      if (!ts?.toDate) return "Just now";
      return ts.toDate().toLocaleString();
    }

    function formatDateString(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
    }

    function formatFirebaseError(err) {
      const parts = [];
      if (err?.code) parts.push(err.code);
      if (err?.message) parts.push(err.message);
      return parts.join(": ") || "Unknown error";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function showNotice(message) {
      document.getElementById("notice-text").textContent = message;
      document.getElementById("notice").classList.remove("hidden");
      document.getElementById("notice").classList.add("flex");
    }

    window.closeNotice = () => {
      document.getElementById("notice").classList.add("hidden");
      document.getElementById("notice").classList.remove("flex");
    };

    function openLightbox(src) {
      document.getElementById("lightbox-img").src = src;
      document.getElementById("lightbox").classList.remove("hidden");
      document.getElementById("lightbox").classList.add("flex");
    }

    window.closeLightbox = () => {
      document.getElementById("lightbox").classList.add("hidden");
      document.getElementById("lightbox").classList.remove("flex");
    };

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(err => console.warn("Service worker registration failed.", err));
      });
    }

    render();
  </script>
